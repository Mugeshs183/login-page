<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Page</title>
<link rel="stylesheet" href="main-css.css">
</head>
<body>

<div class="sign-in">

    <div>
	<h1>sign in</h1>
	<p class="subtitle">or <a class="links" href="">create an account<a></p>
	</div>

    <div class="input-group">
		<input placeholder="Email" type="email">
	</div>
	<div class="input-group">	
		<input placeholder="Password" type="password">
	</div>


	<div class="remember">
		<input id="remain" type="checkbox">
		<label for="remain">Remember me</label>
	</div>

	<div>
		<button class="sign-in-btn">Sign in</button>
		<button class="sign-in-with-google"><img src="asserts/google-icon-logo-svg.svg" alt="Google Image" style=" height: 20px; width: 20px;"> Sign in with Google</button>
	</div>	


		<a class="links" href="">Forgotten your password?</a>
	
</div>

</body>
</html>
